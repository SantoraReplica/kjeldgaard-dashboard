                        <td className="py-3 px-3 text-sm text-slate-600">{vid.editing}</td>
                        <td className="py-3 px-3 text-center font-semibold text-[#0A1628]">{vid.eta}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>
          </div>
        )}

        {/* TAB: PUBLISH */}
        {activeTab === 'publish' && (
          <div className="space-y-8">
            {/* PHASE 2 VISION BANNER */}
            <div className="p-4 bg-gradient-to-r from-[#C9A962]/10 to-[#C9A962]/5 border border-[#C9A962]/30 rounded-lg">
              <div className="flex items-center gap-2 mb-1">
                <Rocket className="w-4 h-4 text-[#C9A962]" />
                <p className="text-sm font-bold text-[#0A1628]">Phase 2 Vision: Campaign Publishing</p>
              </div>
              <p className="text-xs text-slate-600">
                One-click campaign deployment to Meta Ads, automated budget allocation, and weekly client reports via Telegram. Weeks 7–8 deliverable.
              </p>
            </div>

            {/* READY TO LAUNCH */}
            <section>
              <div className="mb-6">
                <h2 className="text-xl font-bold text-[#0A1628]">
                  Ready to Launch
                </h2>
                <p className="text-sm text-slate-600 mt-1">
                  Campaigns staged and queued for deployment.
                </p>
              </div>

              <div className="space-y-4">
                {readyToLaunch.map((campaign, idx) => (
                  <div key={idx} className="bg-gradient-to-r from-green-50 to-emerald-50 rounded-lg shadow-sm border border-green-200 p-6 hover:shadow-md transition-all">
                    <div className="flex items-start justify-between gap-4">
                      <div className="flex-1">
                        <h3 className="font-bold text-[#0A1628] text-lg mb-1">{campaign.name}</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mt-3">
                          <div>
                            <p className="text-xs text-slate-600 font-medium">Platform</p>
                            <p className="text-sm font-semibold text-[#0A1628]">{campaign.platform}</p>
                          </div>
                          <div>
                            <p className="text-xs text-slate-600 font-medium">Budget</p>
                            <p className="text-sm font-semibold text-[#0A1628]">{campaign.budget}</p>
                          </div>
                          <div>
                            <p className="text-xs text-slate-600 font-medium">Audience</p>
                            <p className="text-sm font-semibold text-[#0A1628]">{campaign.audience}</p>
                          </div>
                          <div>
                            <p className="text-xs text-slate-600 font-medium">Launch Date</p>
                            <p className="text-sm font-semibold text-[#0A1628]">{campaign.startDate}</p>
                          </div>
                        </div>
                        <div className="mt-3">
                          <p className="text-xs text-slate-600 font-medium">Est. ROAS: <span className="font-bold text-emerald-600">{campaign.estimatedRoas}</span></p>
                        </div>
                      </div>
                      <button className="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg transition-colors flex items-center gap-2 whitespace-nowrap">
                        <Rocket className="w-4 h-4" />
                        Launch Now
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* ACTIVE CAMPAIGNS */}
            <section className="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
              <h3 className="font-bold text-lg text-[#0A1628] mb-4">Active Campaigns (Live)</h3>
              <div className="space-y-3">
                {activeCampaigns.map((camp, idx) => (
                  <div key={idx} className="flex items-center justify-between p-4 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors">
                    <div className="flex-1">
                      <p className="font-semibold text-[#0A1628] text-sm">{camp.name}</p>
                      <p className="text-xs text-slate-600 mt-1">{camp.platform} · {camp.daysActive} days active</p>
                    </div>
                    <div className="flex items-center gap-6">
                      <div className="text-right">
                        <p className="text-xs text-slate-600">Daily Spend</p>
                        <p className="font-semibold text-[#0A1628]">{formatDKK(camp.dailySpend)}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-xs text-slate-600">Daily Revenue</p>
                        <p className="font-semibold text-emerald-600">{formatDKK(camp.dailyRevenue)}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-xs text-slate-600">ROAS</p>
                        <p className={`font-bold text-lg ${getROASColor(camp.roas)}`}>{camp.roas.toFixed(1)}x</p>
                      </div>
                      <span className={`text-xs font-semibold px-3 py-1 rounded-full border whitespace-nowrap ${
                        camp.status === 'running' ? 'bg-green-100 text-green-700 border-green-300' : 'bg-amber-100 text-amber-700 border-amber-300'
                      }`}>
                        {camp.status === 'running' ? '● Running' : '⚠ Monitoring'}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* WEEKLY REPORT DRAFT */}
            <section className="bg-gradient-to-r from-purple-50 to-purple-100 rounded-lg shadow-sm border border-purple-200 p-6">
              <h3 className="font-bold text-lg text-[#0A1628] mb-3">Weekly Report Draft</h3>
              <div className="bg-white rounded-lg p-4 border border-purple-200 mb-4">
                <p className="font-semibold text-[#0A1628] mb-2">Uge 15 — Kjeldgaard Performance Report</p>
                <p className="text-sm text-slate-700 leading-relaxed">
                  Omsætning: 153.126 DKK (+12%) · ROAS: 5.18x · 3 nye annoncer klar til godkendelse · 1 kilde lukket (AN, -77% ROI) · 2 kampagner planlagt lancering i morgen · Budget reallokeringsstrategi godkendt for Problem Aware segmentet
                </p>
              </div>
              <div className="flex gap-3">
                <button className="flex-1 px-4 py-2 bg-purple-600 hover:bg-purple-700 text-white font-semibold rounded-lg transition-colors flex items-center justify-center gap-2">
                  <Send className="w-4 h-4" />
                  Send via Telegram
                </button>
                <button className="flex-1 px-4 py-2 bg-white hover:bg-slate-50 text-[#0A1628] font-semibold rounded-lg transition-colors border border-purple-300 flex items-center justify-center gap-2">
                  <Edit3 className="w-4 h-4" />
                  Edit Report
                </button>
              </div>
            </section>
          </div>
        )}
      </main>

      {/* FOOTER */}
      <footer className="text-center py-8 border-t border-slate-200 text-slate-600 bg-slate-50">
        <div className="max-w-7xl mx-auto px-6 flex flex-col items-center gap-2">
          <div className="flex items-center gap-4 text-xs">
            <span className="flex items-center gap-1.5 px-3 py-1 bg-blue-50 border border-blue-200 rounded-full">
              <span className="w-1.5 h-1.5 bg-blue-500 rounded-full"></span>
              <span className="font-semibold text-blue-700">ClickMagick</span>
              <span className="text-blue-600">Data Layer</span>
            </span>
            <span className="flex items-center gap-1.5 px-3 py-1 bg-[#C9A962]/10 border border-[#C9A962]/30 rounded-full">
              <span className="w-1.5 h-1.5 bg-[#C9A962] rounded-full"></span>
              <span className="font-semibold text-[#0A1628]">SantoraReplica AI</span>
              <span className="text-slate-600">Intelligence Layer</span>
            </span>
          </div>
          <p className="text-xs text-slate-500">
            Claude Opus 4.6 · Schwartz Framework · 4-Hook Model · Last sync: Apr 9, 2026 08:00
          </p>
        </div>
      </footer>
      </div>{/* END MAIN CONTENT */}
    </div>
  );
};
